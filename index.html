<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Duo Security Vault</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body { background-color: #0b0f19; color: #f3f4f6; font-family: sans-serif; }
    </style>
</head>
<body class="min-h-screen flex flex-col items-center justify-center p-4">

    <!-- LOGIN SCREEN -->
    <div id="login-screen" class="w-full max-w-md bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl space-y-6">
        <div class="text-center">
            <h1 class="text-2xl font-bold tracking-tight text-indigo-400">Duo Security Vault</h1>
            <p class="text-sm text-gray-400 mt-1">Dual Auth Token Protocol Required</p>
        </div>
        
        <div class="space-y-6">
            <!-- Slot 1 Container -->
            <div class="p-3 bg-gray-950 border border-gray-800 rounded-xl space-y-2">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Slot 01 (Partner 1 PIN)</label>
                <div class="flex gap-2">
                    <input type="password" id="pin-1" placeholder="••••" maxlength="4" class="flex-1 bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-center text-lg tracking-widest text-indigo-400 focus:outline-none focus:border-indigo-500">
                    <button id="auth-btn-1" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 rounded-lg transition">Verify 1</button>
                </div>
            </div>

            <!-- Slot 2 Container -->
            <div class="p-3 bg-gray-950 border border-gray-800 rounded-xl space-y-2">
                <label class="block text-xs font-semibold text-gray-400 uppercase tracking-wider">Slot 02 (Partner 2 PIN)</label>
                <div class="flex gap-2">
                    <input type="password" id="pin-2" placeholder="••••" maxlength="4" class="flex-1 bg-gray-900 border border-gray-800 rounded-lg px-3 py-2 text-center text-lg tracking-widest text-indigo-400 focus:outline-none focus:border-indigo-500">
                    <button id="auth-btn-2" class="bg-indigo-600 hover:bg-indigo-500 text-white text-xs font-semibold px-4 rounded-lg transition">Verify 2</button>
                </div>
            </div>

            <p id="status-text" class="text-center text-sm text-gray-500 min-h-[20px]"></p>
        </div>
    </div>

    <!-- VAULT INTERFACE (HIDDEN BY DEFAULT) -->
    <div id="vault-screen" class="hidden w-full max-w-4xl bg-gray-900 border border-gray-800 rounded-2xl p-6 shadow-2xl space-y-6">
        <div class="flex justify-between items-center border-b border-gray-800 pb-4">
            <div>
                <h2 class="text-xl font-bold text-emerald-400">Vault Decrypted</h2>
                <p class="text-xs text-gray-400">Secure Cloud Synchronization Active</p>
            </div>
            <button id="lock-btn" class="bg-red-950/40 hover:bg-red-900/40 text-red-400 border border-red-900/50 px-4 py-2 rounded-xl text-sm font-semibold transition">
                Secure Vault
            </button>
        </div>

        <!-- Real-time Text Log Section -->
        <div class="bg-gray-950 border border-gray-800 rounded-xl p-4 space-y-4">
            <h3 class="text-sm font-semibold text-gray-400 uppercase tracking-wider">Shared Vault Log</h3>
            <div id="vault-logs" class="h-40 overflow-y-auto space-y-2 text-sm p-2 bg-gray-900/50 rounded-lg border border-gray-800">
                <p class="text-gray-600">No logs transmitted yet.</p>
            </div>
            <div class="flex gap-2">
                <input type="text" id="log-input" placeholder="Type a message or note to sync..." class="flex-1 bg-gray-900 border border-gray-800 rounded-xl px-4 py-2 text-sm focus:outline-none focus:border-indigo-500 text-gray-200">
                <button id="send-log-btn" class="bg-indigo-600 hover:bg-indigo-500 text-white text-sm font-semibold px-4 py-2 rounded-xl transition">Send</button>
            </div>
        </div>
    </div>

    <!-- FIREBASE AND CORE APP LOGIC -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
        import { getDatabase, ref, set, onValue, update } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-database.js";

        // Your exact Firebase configuration keys
        const firebaseConfig = {
            apiKey: "AIzaSyBLSU33zCD-kq7ToC2IpcPNp7i4JbnRUv8",
            authDomain: "fortis-vault-dc0c1.firebaseapp.com",
            projectId: "fortis-vault-dc0c1",
            storageBucket: "fortis-vault-dc0c1.firebasestorage.app",
            messagingSenderId: "149507752305",
            appId: "1:149507752305:web:1f773658e6616ac08ff6d0",
            measurementId: "G-NWMRKZQ09L"
        };

        // Initialize Firebase & Realtime Database targeting your specific Singapore instance
        const app = initializeApp(firebaseConfig);
        const db = getDatabase(app, "https://fortis-vault-dc0c1-default-rtdb.asia-southeast1.firebasedatabase.app");
        const sessionRef = ref(db, "vault_session");

        const loginScreen = document.getElementById('login-screen');
        const vaultScreen = document.getElementById('vault-screen');
        const statusText = document.getElementById('status-text');
        const pin1Input = document.getElementById('pin-1');
        const pin2Input = document.getElementById('pin-2');
        const vaultLogs = document.getElementById('vault-logs');
        const logInput = document.getElementById('log-input');

        // Listen for live authorization changes
        onValue(sessionRef, (snapshot) => {
            const data = snapshot.val() || { p1_active: false, p2_active: false };
            
            if (!data.p1_active && !data.p2_active) {
                statusText.innerText = "Awaiting credentials from both terminals...";
                statusText.className = "text-center text-sm text-gray-500";
            } else if (data.p1_active && !data.p2_active) {
                statusText.innerText = "Slot 01 Verified. Awaiting Slot 02 authorization...";
                statusText.className = "text-center text-sm text-indigo-400 animate-pulse";
            } else if (!data.p1_active && data.p2_active) {
                statusText.innerText = "Slot 02 Verified. Awaiting Slot 01 authorization...";
                statusText.className = "text-center text-sm text-indigo-400 animate-pulse";
            }

            if (data.p1_active && data.p2_active) {
                loginScreen.classList.add('hidden');
                vaultScreen.classList.remove('hidden');
            } else {
                loginScreen.classList.remove('hidden');
                vaultScreen.classList.add('hidden');
            }

            // Sync structural text logs inside the vault
            if (data.logs) {
                vaultLogs.innerHTML = Object.values(data.logs)
                    .map(log => `<div class="border-b border-gray-800/40 pb-1 text-gray-300"><span class="text-indigo-400 font-mono text-xs mr-2">[${log.time}]</span>${log.text}</div>`)
                    .join('');
                vaultLogs.scrollTop = vaultLogs.scrollHeight;
            } else {
                vaultLogs.innerHTML = `<p class="text-gray-600">No logs transmitted yet.</p>`;
            }
        });

        // Split Auth Verification Logic
        document.getElementById('auth-btn-1').addEventListener('click', () => {
            if (pin1Input.value.trim() === "1234") { 
                update(sessionRef, { p1_active: true });
            } else {
                alert("Invalid Slot 01 PIN Code");
            }
        });

        document.getElementById('auth-btn-2').addEventListener('click', () => {
            if (pin2Input.value.trim() === "5678") { 
                update(sessionRef, { p2_active: true });
            } else {
                alert("Invalid Slot 02 PIN Code");
            }
        });

        // Log message transmitter logic
        document.getElementById('send-log-btn').addEventListener('click', () => {
            const text = logInput.value.trim();
            if (!text) return;

            const logId = Date.now();
            const timeString = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            const newLogRef = ref(db, `vault_session/logs/${logId}`);
            set(newLogRef, { text: text, time: timeString });
            logInput.value = "";
        });

        // Close action resets states globally
        document.getElementById('lock-btn').addEventListener('click', () => {
            pin1Input.value = "";
            pin2Input.value = "";
            set(sessionRef, { p1_active: false, p2_active: false, logs: null });
        });
    </script>
</body>
</html>
